version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mathgpt-postgres
    restart: always
    environment:
      POSTGRES_USER: mathgpt_admin
      POSTGRES_PASSWORD: mathgpt_secure_pass_9988
      POSTGRES_DB: mathgpt_prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathgpt_admin -d mathgpt_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mathgpt-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mathgpt-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: mathgpt-neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j_secure_pass_7788
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4j_secure_pass_7788", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mathgpt-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://mathgpt_admin:mathgpt_secure_pass_9988@postgres:5432/mathgpt_prod
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j_secure_pass_7788
      - REDIS_HOST=redis
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mathgpt-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=postgresql://mathgpt_admin:mathgpt_secure_pass_9988@postgres:5432/mathgpt_prod
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j_secure_pass_7788
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
      - qdrant
      - neo4j

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mathgpt-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  qdrantdata:
  neo4jdata:
