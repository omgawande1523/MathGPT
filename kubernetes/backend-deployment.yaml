apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  ports:
    - port: 8000
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: mathgpt-backend:latest
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: postgresql://mathgpt_admin:mathgpt_secure_pass_9988@postgres:5432/mathgpt_prod
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/0
            - name: QDRANT_HOST
              value: qdrant
            - name: NEO4J_URI
              value: bolt://neo4j:7687
            - name: NEO4J_USER
              value: neo4j
            - name: NEO4J_PASSWORD
              value: neo4j_secure_pass_7788
            - name: REDIS_HOST
              value: redis
          ports:
            - containerPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: mathgpt-backend:latest
          imagePullPolicy: Never
          command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info"]
          env:
            - name: DATABASE_URL
              value: postgresql://mathgpt_admin:mathgpt_secure_pass_9988@postgres:5432/mathgpt_prod
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/0
            - name: QDRANT_HOST
              value: qdrant
            - name: NEO4J_URI
              value: bolt://neo4j:7687
            - name: NEO4J_USER
              value: neo4j
            - name: NEO4J_PASSWORD
              value: neo4j_secure_pass_7788
            - name: REDIS_HOST
              value: redis
